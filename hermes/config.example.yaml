# Hermes Agent v2026.7.20 / source commit c7d08de287556b3d339df336b180a39d4980ebd7
# Replace every Discord ID before enabling the gateway.

display:
  tool_progress: log
  interim_assistant_messages: false
  show_commentary: false
  background_process_notifications: off

# Generic Hermes cron delivery is intentionally unavailable in Docket Discord
# channels. Docket owns durable reminders and routes them through daily threads.
platform_toolsets:
  discord:
    - browser
    - clarify
    - code_execution
    - computer_use
    - delegation
    - file
    - image_gen
    - memory
    - session_search
    - skills
    - terminal
    - todo
    - tts
    - vision
    - web

discord:
  require_mention: true
  thread_require_mention: false
  free_response_channels:
    - "000000000000000003" # docket-chat
    - "000000000000000004" # docket-queue; plugin drops non-control messages
  allowed_channels:
    - "000000000000000003" # docket-chat
    - "000000000000000004" # docket-queue
    - "000000000000000005" # docket-system
  no_thread_channels:
    - "000000000000000003"
    - "000000000000000004"
  ignored_channels: []
  history_backfill: false
  allow_mentions:
    everyone: false
    roles: false
    users: true
    replied_user: true

group_sessions_per_user: true

plugins:
  enabled:
    - docket-discord

mcp_servers:
  docket:
    url: "http://docket:8000/mcp/"
    headers:
      Authorization: "Bearer ${DOCKET_MCP_TOKEN}"
    timeout: 30
    connect_timeout: 15
    supports_parallel_tool_calls: false
    sampling:
      enabled: false
    tools:
      include:
        - docket_store_record
        - docket_get_record
        - docket_search_records
        - docket_update_record
        - docket_archive_record
        - docket_list_accounts
        - docket_list_calendar_events
        - docket_get_calendar_sync_status
        - docket_list_reminder_rules
        - docket_set_reminder_rule
        - docket_disable_reminder_rule
        - docket_list_queue_items
        - docket_get_queue_item
        - docket_snooze_queue_item
        - docket_ignore_queue_item
        - docket_propose_action
        - docket_get_action
      prompts: false
      resources: false
